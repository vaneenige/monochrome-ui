<style>.menu {
        position: relative;
        display: inline-block;
      }
      [role="menu"] {
        position: fixed;
        inset: auto;
        margin: 0;
        top: var(--bottom);
        left: var(--left);
      }</style>
<div style="display:flex;gap:200px">
  <div class="menu" id="mcr:menu:1">

      <li role="none">

      </li>

        <button data-testid="menu-b-item-1" type="button" role="menuitem" tabindex="-1">Item B1</button>

    </ul>

</div>
