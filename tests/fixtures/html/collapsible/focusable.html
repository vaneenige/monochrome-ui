<div>

  <div data-testid="focusable-content" id="mcc:collapsible:1" aria-labelledby="mct:collapsible:1" aria-hidden="true" hidden="until-found">
    <p>This content has focusable elements:</p>
    <input type="text" data-testid="focusable-input" placeholder="Input field"/>
    <a href="#" data-testid="focusable-link">A link</a>

  </div>
</div>

    <p>This collapsible contains various HTML elements:</p>
    <ul>
      <li>List item 1</li>
      <li>List item 2</li>
      <li>List item 3</li>

    <button type="button" data-testid="rich-content-button">Button inside collapsible</button>
  </div>
